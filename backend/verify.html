<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MWIS 알고리즘 검증 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0f1a; --surface: #161929; --surface2: #1e2235;
      --border: #2a2e4a; --text: #e2e6f0; --muted: #7a82a0;
      --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --amber: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; line-height: 1.6;
      padding: 2.5rem 3rem; max-width: 1100px; margin: 0 auto;
    }
    header { text-align: center; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    header h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.4rem; }
    header p  { color: var(--muted); font-size: 0.9rem; }
    section   { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; }
    section h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.4rem; }
    .desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .loading { color: var(--muted); padding: 2rem; text-align: center; font-size: 0.85rem; }
    .error   { color: var(--red); padding: 1rem; font-size: 0.85rem; }

    /* Adversarial */
    .adv-policies { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .adv-policies th { text-align: left; padding: 0.4rem 0.75rem; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
    .adv-policies td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(42,46,74,0.6); }
    .adv-policies tr:last-child td { border-bottom: none; }
    .adv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .adv-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; }
    .adv-box.winner { border-color: var(--green); }
    .adv-box.loser  { border-color: var(--red); }
    .adv-box.tie    { border-color: var(--amber); }
    .adv-box h3 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.75rem; }
    .tag { display: inline-block; background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25); border-radius: 5px; padding: 0.2rem 0.55rem; font-size: 0.82rem; margin: 0.2rem 0.2rem 0.2rem 0; }
    .benefit-num { margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); font-size: 1.25rem; font-weight: 700; }
    .benefit-num.green { color: var(--green); }
    .benefit-num.red   { color: var(--red); }
    .benefit-num.amber { color: var(--amber); }
    .adv-footer { margin-top: 1rem; font-size: 0.82rem; color: var(--muted); }

    /* Cross-solver */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem 0.85rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
    td { padding: 0.65rem 0.85rem; border-bottom: 1px solid rgba(42,46,74,0.5); }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.ok   { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .badge.fail { background: rgba(239,68,68,0.12);  color: var(--red);   border: 1px solid rgba(239,68,68,0.3); }
    .badge.skip { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    .cross-footer { margin-top: 1rem; font-size: 0.82rem; padding: 0.6rem 0.85rem; border-radius: 6px; }
    .cross-footer.ok   { background: rgba(34,197,94,0.08); color: var(--green); }
    .cross-footer.fail { background: rgba(239,68,68,0.08);  color: var(--red); }

    /* Distribution */
    .stats-row { display: flex; gap: 2.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-val  { font-size: 1.5rem; font-weight: 700; }
    .stat-lbl  { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .chart-wrap { position: relative; height: 300px; }
  </style>
</head>
<body>

<header>
  <h1>청년 지원금 최적 조합 탐색기 — 알고리즘 검증</h1>
  <p>MWIS (Maximum Weight Independent Set) 정확성 및 성능 분석 · OSS-2026-10</p>
</header>

<section>
  <h2>① 교차 솔버 검증</h2>
  <p class="desc">전수탐색 오라클(Stage A)과 항상 동일한 최적해 — 4개 프로필 비교</p>
  <div id="cross"><div class="loading">데이터 로딩 중…</div></div>
</section>

<section>
  <h2>② 유효 조합 수혜액 분포</h2>
  <p class="desc">전체 유효 조합 전수 열거 — MWIS가 선택한 조합이 최대 수혜액임을 증명</p>
  <div style="margin-bottom:1rem">
    <label style="font-size:0.85rem;color:var(--muted);margin-right:0.5rem">프로필 선택:</label>
    <select id="profile-select" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:0.4rem 0.6rem;font-size:0.85rem">
      <option value="0">25세 / 미취업 / 서울 / 소득 60%</option>
      <option value="1">22세 / 미취업 / 서울 / 소득 40%</option>
      <option value="2">28세 / 취업 / 전국 / 소득 80%</option>
      <option value="3">26세 / 미취업 / 전국 / 소득 50%</option>
    </select>
  </div>
  <div id="dist-stats"></div>
  <div class="chart-wrap"><canvas id="hist"></canvas></div>
</section>

<script>
const BASE = '';
const fmt = n => Math.round(n / 10000).toLocaleString('ko-KR') + '만원';

// ── ① Cross-Solver ─────────────────────────────────────────────
async function loadCrossSolver() {
  const el = document.getElementById('cross');
  try {
    const d = await fetch(`${BASE}/verify/cross-solver`).then(r => r.json());
    const { rows, summary } = d;
    if (!rows.length) { el.innerHTML = '<div class="loading">데이터 없음</div>'; return; }

    const solverNames = rows[0].solvers.map(s => s.name);

    el.innerHTML = `
      <div style="display:flex;gap:2rem;margin-bottom:1.25rem;flex-wrap:wrap">
        <div class="stat-item">
          <div class="stat-val" style="color:${summary.all_match ? 'var(--green)' : 'var(--red)'}">${summary.mismatch_count === 0 ? '0건' : summary.mismatch_count + '건'}</div>
          <div class="stat-lbl">불일치</div>
        </div>
        <div class="stat-item">
          <div class="stat-val">${summary.total_compared}</div>
          <div class="stat-lbl">총 비교 횟수</div>
        </div>
      </div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:1rem;padding:0.6rem 0.85rem;background:rgba(0,0,0,0.2);border-radius:6px">
        Stage A = 전체 독립 집합 전수탐색 (2^N 탐색) → 수학적 최적해 보장. 나머지 솔버가 Stage A와 동일한 값을 내면 최적성 증명.
      </div>
      <table>
        <thead>
          <tr>
            <th>프로필</th>
            <th style="text-align:center">N</th>
            <th style="text-align:center">탐색공간</th>
            <th style="text-align:right">최적 수혜액</th>
            ${solverNames.map(n => `<th style="text-align:right">${n}</th>`).join('')}
            <th style="text-align:center">일치</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const refSolver = r.solvers.find(s => s.name === r.reference && !s.skipped);
            const benefit = refSolver ? fmt(refSolver.benefit) : '—';
            return `<tr>
              <td>${r.profile}</td>
              <td style="text-align:center;color:var(--muted)">${r.n_candidates}</td>
              <td style="text-align:center;color:var(--muted)">2^${r.n_candidates} = ${r.search_space.toLocaleString()}</td>
              <td style="text-align:right;font-weight:600">${benefit}</td>
              ${r.solvers.map(s => {
                if (s.skipped) return `<td style="text-align:right;color:var(--muted)">생략</td>`;
                const color = s.match ? 'var(--green)' : 'var(--red)';
                const isRef = s.name === r.reference;
                return `<td style="text-align:right;color:${color};${isRef ? 'font-weight:600' : ''}">${s.ms}ms${isRef ? ' ★' : ''}</td>`;
              }).join('')}
              <td style="text-align:center">
                <span class="badge ${r.all_match ? 'ok' : 'fail'}">${r.all_match ? '✓ 일치' : '✗ 불일치'}</span>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.6rem">★ = 기준값 (전수탐색 오라클). 시간 색상: 초록 = 기준값과 일치, 빨강 = 불일치</div>
      <div class="cross-footer ${summary.all_match ? 'ok' : 'fail'}" style="margin-top:0.75rem">
        ${summary.all_match
          ? `✓ ${summary.total_compared}회 비교 중 불일치 0건 — 전수탐색과 항상 동일한 최적해`
          : `✗ ${summary.mismatch_count}건 불일치 발생 — 알고리즘 검토 필요`}
      </div>
    `;
  } catch (e) {
    el.innerHTML = `<div class="error">연결 실패: ${e.message}</div>`;
  }
}

// ── ② Distribution (산점도) ────────────────────────────────────
let scatterChart = null;

async function loadDistribution(profileIdx = 0) {
  try {
    const d = await fetch(`${BASE}/verify/distribution?profile_idx=${profileIdx}`).then(r => r.json());
    const s = d.stats || {};
    const points = d.points || [];

    document.getElementById('dist-stats').innerHTML = `
      <div class="stats-row">
        <div class="stat-item"><div class="stat-val">${d.total_valid.toLocaleString()}</div><div class="stat-lbl">유효 조합 수</div></div>
        <div class="stat-item"><div class="stat-val">${d.n_candidates}</div><div class="stat-lbl">MWIS 후보 정책</div></div>
        <div class="stat-item"><div class="stat-val" style="color:var(--muted)">${fmt(s.mean || 0)}</div><div class="stat-lbl">평균 수혜액</div></div>
        <div class="stat-item"><div class="stat-val" style="color:var(--muted)">${fmt(s.median || 0)}</div><div class="stat-lbl">중앙값</div></div>
        <div class="stat-item"><div class="stat-val" style="color:var(--red)">${fmt(d.optimal)}</div><div class="stat-lbl">MWIS 최적값 (1위)</div></div>
        <div class="stat-item"><div class="stat-val" style="color:var(--green)">${s.mean_ratio ? s.mean_ratio + '배' : '—'}</div><div class="stat-lbl">평균 대비 배율</div></div>
      </div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:1rem;padding:0.6rem 0.85rem;background:rgba(0,0,0,0.2);border-radius:6px">
        전체 ${d.total_valid.toLocaleString()}개 유효 조합 전수 열거 — 각 점에 커서를 올리면 해당 조합의 정책 목록을 확인할 수 있습니다. <span style="color:var(--red)">빨간 점</span> = MWIS 최적 조합.
      </div>
      ${d.capped ? '<p style="font-size:0.8rem;color:var(--amber);margin-bottom:0.75rem">※ 후보 20개 초과 — 상위 20개 기준 계산</p>' : ''}
    `;

    if (scatterChart) { scatterChart.destroy(); scatterChart = null; }

    if (!points.length) {
      document.getElementById('dist-stats').innerHTML += '<div class="loading">해당 프로필에 매칭되는 정책이 없습니다.</div>';
      return;
    }

    const bgColors = points.map(p => p.is_optimal ? 'rgba(239,68,68,0.95)' : 'rgba(59,130,246,0.55)');
    const radii    = points.map(p => p.is_optimal ? 10 : 5);

    scatterChart = new Chart(document.getElementById('hist'), {
      type: 'scatter',
      data: {
        datasets: [{
          label: '유효 조합',
          data: points.map(p => ({ x: p.x, y: Math.round(p.benefit / 10000) })),
          backgroundColor: bgColors,
          pointRadius: radii,
          pointHoverRadius: radii.map(r => r + 4),
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            callbacks: {
              title: items => {
                const pt = points[items[0].dataIndex];
                return pt.is_optimal ? '★ MWIS 최적 조합' : `유효 조합 #${items[0].dataIndex + 1}`;
              },
              label: item => `수혜액: ${fmt(points[item.dataIndex].benefit)}`,
              afterLabel: item => points[item.dataIndex].policies.map(p => `  · ${p}`),
            },
            backgroundColor: 'rgba(22,25,41,0.95)',
            titleColor: '#e2e6f0',
            bodyColor: '#7a82a0',
            borderColor: '#2a2e4a',
            borderWidth: 1,
            padding: 12,
          }
        },
        scales: {
          x: {
            title: { display: true, text: '조합 인덱스 (수혜액 오름차순)', color: '#7a82a0', font: { size: 11 } },
            ticks: { color: '#7a82a0', font: { size: 11 } },
            grid: { color: 'rgba(42,46,74,0.5)' }
          },
          y: {
            title: { display: true, text: '수혜액 (만원)', color: '#7a82a0', font: { size: 11 } },
            ticks: { color: '#7a82a0', font: { size: 11 }, callback: v => v + '만' },
            grid: { color: 'rgba(42,46,74,0.5)' }
          }
        }
      }
    });
  } catch (e) {
    document.getElementById('dist-stats').innerHTML = `<div class="error">연결 실패: ${e.message}</div>`;
  }
}

document.getElementById('profile-select').addEventListener('change', e => {
  loadDistribution(parseInt(e.target.value));
});

loadCrossSolver();
loadDistribution(0);
</script>
</body>
</html>
